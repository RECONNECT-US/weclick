<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WECLICK Quiz</title>

<style>
:root{
  --bg1:#0c2a52;
  --bg2:#1d4f8f;
  --bg3:#2f6fba;
  --panel:#ffffff;
  --text:#15304f;
  --muted:#5c7188;
  --accent:#2f7de1;
  --border:#d5e1ef;
  --shadow:0 14px 36px rgba(6,24,49,.18);
  --radius:24px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(145deg,var(--bg1),var(--bg2) 55%,var(--bg3));
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container{
  width:95%;
  max-width:900px;
}

.header{
  text-align:center;
  margin-bottom:20px;
}

.header h1{
  margin:0;
  font-size:1.8rem;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.tile{
  background:var(--panel);
  color:var(--text);
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.tile h2{
  margin:0 0 10px;
  font-size:1.3rem;
}

.tile p{
  margin:0;
  color:var(--muted);
  font-size:0.95rem;
}

.btn{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:16px;
  background:var(--accent);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  text-align:center;
}

.btn:hover{
  opacity:0.9;
}

@media(max-width:700px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<div class="container">

  <div class="header">
    <h1>WECLICK Quiz</h1>
  </div>

  <div class="grid">

    <div class="tile">
      <div>
        <h2>🎮 Quiz 1</h2>
        <p>Online Survival Game</p>
      </div>
      <button class="btn" onclick="window.location.href='./online-survival/index.html'">
        Open
      </button>
    </div>

    <div class="tile">
      <div>
        <h2>🧠 Quiz 2</h2>
        <p>Scam Spotter Pro</p>
      </div>
      <button class="btn" onclick="window.location.href='./scam-spotter/index.html'">
        Open
      </button>
    </div>

  </div>

</div>
</body>
</html>
