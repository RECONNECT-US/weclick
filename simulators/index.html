<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECONNECT-US • Simulators</title>
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}
.box{
  text-align:center;
  max-width:420px;
  width:100%;
  padding:20px;
}
h1{margin-bottom:20px;}
.btn{
  display:block;
  margin:12px auto;
  padding:14px;
  border-radius:10px;
  border:none;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  width:100%;
}
.primary{background:#22d7c6;color:#042131;}
.alt{background:#59a9ff;color:#042131;}
.back{margin-top:20px;background:#444;color:white;}
.note{
  margin-top:16px;
  font-size:13px;
  color:#cbd5e1;
}
</style>
</head>
<body>
<div class="box">
  <h1>Simulators</h1>

  <button class="btn primary" type="button" onclick="go('./govuk.html')">
    GOV.UK Training Simulator
  </button>

  <button class="btn primary" type="button" onclick="go('./nhs.html')">
    NHS App Training Simulator
  </button>

  <button class="btn alt" type="button" onclick="go('./citizens.html')">
    Citizens Advice Simulator
  </button>

  <button class="btn back" type="button" onclick="backHome()">
    Back to Home
  </button>

  <div class="note">This index file must sit in the same folder as govuk.html, nhs.html and citizens.html.</div>
</div>

<script>
function go(page){
  window.location.href = page;
}
function backHome(){
  window.location.href = '../index.html';
}
</script>
</body>
</html>
