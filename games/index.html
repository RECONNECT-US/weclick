<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECONNECT-US • Games</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.box{
  text-align:center;
  max-width:420px;
  width:100%;
}

h1{
  margin-bottom:20px;
}

.btn{
  display:block;
  margin:10px auto;
  padding:14px;
  border-radius:10px;
  border:none;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  width:100%;
}

.primary{
  background:#22d7c6;
  color:#042131;
}

.alt{
  background:#59a9ff;
  color:#042131;
}

.back{
  margin-top:20px;
  background:#444;
  color:white;
}
</style>
</head>

<body>

<div class="box">
  <h1>Games & Learning</h1>
  <div id="learnerBadge" style="display:none;margin:0 auto 16px auto;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.12);max-width:420px;font-weight:bold;">
    Learner: <span id="learnerNameText"></span>
  </div>

  <button class="btn primary" onclick="go('money.html')">
    Money Builder
  </button>

  <button class="btn primary" onclick="go('clock.html')">
    Clock Learning
  </button>

  <button class="btn alt" onclick="go('wordsearch.html')">
    Word Search
  </button>

  <button class="btn alt" onclick="go('ballsort.html')">
    Ball Sort Game
  </button>

  <button class="btn primary" onclick="go('draughts-chess.html')">
    Draughts & Chess
  </button>

  <button class="btn back" onclick="backHome()">
    Back to Home
  </button>
</div>

<script>
function getLearnerName(){
  const params = new URLSearchParams(window.location.search);
  const queryLearner = params.get('learner');
  if (queryLearner) return queryLearner;
  try {
    const shared = JSON.parse(localStorage.getItem('reconnectus_shared_current_learner_v1') || 'null');
    if (shared && shared.name) return shared.name;
  } catch(e){}
  return '';
}

function withLearner(page){
  const learner = getLearnerName();
  if (!learner) return page;
  return page + (page.includes('?') ? '&' : '?') + 'learner=' + encodeURIComponent(learner);
}

function go(page){
  window.location.href = withLearner(page);
}

function backHome(){
  window.location.href = withLearner("../index.html");
}

(function showLearner(){
  const learner = getLearnerName();
  if (!learner) return;
  const badge = document.getElementById('learnerBadge');
  const text = document.getElementById('learnerNameText');
  if (badge && text){
    text.textContent = learner;
    badge.style.display = 'block';
  }
})();
</script>

</body>
</html>
